<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission Water One</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game">
    <header id="hud">
      <div class="hud-box">WaterCon: <span id="waterCon">3</span></div>
      <div class="hud-box">Fuel: <span id="fuel">100</span></div>
      <div class="hud-box">Score: <span id="score">0</span></div>
      <div class="hud-box">Time: <span id="timer">90</span></div>
    </header>

    <main id="scene"></main>

    <section id="dialogueBox">
      <div id="speaker">Orion</div>
      <div id="dialogue">Loading...</div>
      <div id="choices"></div>
      <div class="controls">
        <button id="nextBtn">Next</button>
        <button id="resetBtn">Reset</button>
      </div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
